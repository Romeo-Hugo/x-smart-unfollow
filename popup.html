<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Smart Unfollow - AI分析版</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> X Smart Unfollow</h1>
            <div class="subtitle">AI智能分析 · 精准识别Crypto博主</div>
        </div>
        
        <div class="status" id="status">
            准备分析您的关注列表
        </div>
        
        <div class="controls">
            <button id="analyzeBtn" class="btn btn-primary">
                <i class="fas fa-search"></i> 开始AI分析
            </button>
            <button id="unfollowBtn" class="btn btn-danger" disabled>
                <i class="fas fa-user-minus"></i> 批量取关
            </button>
        </div>
        
        <div class="controls">
            <button id="settingsBtn" class="btn btn-secondary">
                <i class="fas fa-cog"></i> 设置
            </button>
        </div>
        
        <div class="progress-container" id="progress">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">准备开始...</div>
        </div>
        
        <div class="results" id="results">
            <!-- 分析结果将在这里显示 -->
            <div class="no-results">
                <i class="fas fa-info-circle"></i><br>
                点击"开始AI分析"按钮分析您的关注列表
            </div>
        </div>
        
        <div class="footer">
            <div style="text-align: center; margin-top: 15px; font-size: 11px; color: #7f8c8d;">
                <i class="fas fa-brain"></i> 由DeepSeek AI驱动 · v2.0
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
